<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Top War</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="stage" class="stage">
    <!-- 상단 HUD -->
    <header id="hud" class="hud" hidden>
      <button id="btn-menu" class="hud-btn" title="나가기">⮜</button>
      <div class="hud-center">
        <div id="hud-stage" class="hud-stage">SCORE 0</div>
        <div id="hud-army" class="hud-army">🪖 0</div>
        <div id="hud-power" class="hud-power">⚡2.0 🔥1</div>
      </div>
      <div class="hud-right">
        <button id="btn-save" class="hud-btn" title="저장">💾</button>
        <button id="btn-pause" class="hud-btn" title="일시정지">⏸</button>
      </div>
    </header>

    <!-- 게임 캔버스 -->
    <canvas id="game-canvas" width="400" height="700"></canvas>

    <!-- 시작 화면 -->
    <div id="screen-select" class="overlay">
      <div class="panel">
        <h1 class="title">TOP WAR</h1>
        <p class="tagline">
          성장 레인에서 병사를 모으고, 적 레인의 적을 쏘고,<br />
          무기 레인의 무기를 부숴 업그레이드하라.<br />
          멀리서 쏴 막지 못하면 병사가 줄어든다!
        </p>
        <div id="tw-best" class="card-progress">최고 점수 0</div>
        <div id="continue-row"></div>
        <button id="btn-start" class="game-btn primary">생존 시작</button>
        <a href="../../index.html" class="link-back">⮜ 라이브러리로</a>
      </div>
    </div>

    <!-- 일시정지 -->
    <div id="screen-pause" class="overlay" hidden>
      <div class="panel">
        <h1 class="title">일시정지</h1>
        <button id="btn-resume" class="game-btn primary">계속하기</button>
        <button id="btn-save2" class="game-btn">현재 상황 저장</button>
        <button id="btn-quit" class="game-btn ghost">시작 화면으로</button>
      </div>
    </div>

    <!-- 결과 -->
    <div id="screen-result" class="overlay" hidden>
      <div class="panel">
        <h1 id="result-title" class="title">GAME OVER</h1>
        <p id="result-sub" class="tagline"></p>
        <button id="btn-retry" class="game-btn primary">다시 도전</button>
        <button id="btn-tomenu" class="game-btn ghost">시작 화면</button>
      </div>
    </div>

    <!-- 토스트 -->
    <div id="toast" class="toast" hidden></div>

    <!-- 조작 안내 -->
    <div id="hint-controls" class="controls-hint" hidden>
      드래그 / 좌우키로 레인 이동
    </div>
  </div>

  <!-- ES 모듈 미사용: file:// 에서도 동작하도록 일반 스크립트를 순서대로 로드 -->
  <script src="../../js/storage.js"></script>
  <script src="./stages.js"></script>
  <script src="./game.js"></script>
</body>
</html>
